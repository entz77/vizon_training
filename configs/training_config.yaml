# YOLO Training Configuration

# Model settings
model_size: 'l'  # Model size: n, s, m, l, x
task: 'detect'   # Task type: detect or obb
model_name: null # Optional explicit model checkpoint (e.g. yolo26m-obb.pt)

# Training parameters
epochs: 100
batch_size: 6
imgsz: 640
patience: 50

# Learning rate parameters
lr0: 0.01      # Initial learning rate
lrf: 0.01      # Final learning rate ratio

# Optimizer parameters
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3

# Data augmentation
hsv_h: 0.015   # HSV-Hue augmentation
hsv_s: 0.7     # HSV-Saturation augmentation
hsv_v: 0.4     # HSV-Value augmentation
degrees: 0.0   # Rotation augmentation
translate: 0.1 # Translation augmentation
scale: 0.5     # Scale augmentation
flipud: 0.0    # Flip upside-down probability
fliplr: 0.5    # Flip left-right probability
mosaic: 1.0    # Mosaic augmentation

# Device and logging
device: cuda   # cuda, cpu, or null for auto
verbose: true
save_period: 10

# Directories
data_dir: /home/enitze/projects/repos/vizon/vizon_training/datasets
log_dir: /home/enitze/projects/repos/vizon/vizon_training/logs/log
output_dir: /home/enitze/projects/repos/vizon/vizon_training/runs/run
