# Dataset Configuration Example
# Update this file with your actual dataset paths and classes

path: datasets/coco128  # Dataset root directory

# Train, val, test splits
train: images/train
val: images/val
test: images/test

# Number of classes
nc: 80

# Class names
names:
  0: person
  1: bicycle
  2: car
  3: motorcycle
  4: airplane
  5: bus
  6: train
  7: truck
  8: boat
  9: traffic light
  # ... add more classes as needed
  79: toothbrush
